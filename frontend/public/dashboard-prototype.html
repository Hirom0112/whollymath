<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhollyMath — Teacher Dashboard (merged prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --wm-page-bg:#e9e1cc; --wm-cream:#f7efdc; --wm-cream-2:#f1e7c9;
  --wm-navy-deep:#1f2c5c; --wm-navy:#2f43a6; --wm-blue:#3a59d9;
  --wm-blue-bright:#4a6cf0; --wm-blue-press:#2f4dc9; --wm-blue-tile:#b9d3ef; --wm-blue-soft:#b9c8ee;
  --wm-ink:#161616; --wm-ink-soft:#2a2a2a;
  --wm-mean-correct:#9ad17c; --wm-mean-correct-ink:#3f7a3a;
  --wm-mean-attention:#e0a33a; --wm-mean-attention-ink:#9a6a12;
  --wm-mean-wrong:#d9663f; --wm-mean-wrong-ink:#a8401d;
  --wm-mean-magnitude:#2f9c93; --wm-mean-operation:#5b62d6;
  --wm-mean-spark:#f5cf5b; --wm-info-ink:#2f43a6;
  --wm-card-warm:#f8e1d4; --wm-card-mint:#d9ecdb; --wm-card-sky:#d8e6f7; --wm-card-butter:#f6e9bf; --wm-card-lavender:#e7ddf3;
  --wm-font-serif:'Fraunces',Georgia,serif; --wm-font-sans:'Inter',system-ui,sans-serif;
  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-pill:999px;
  --sh-card:0 2px 0 rgba(20,30,70,.08), inset 0 0 0 1.5px rgba(20,30,70,.06);
  --sh-soft:0 18px 40px -18px rgba(20,30,70,.30);
  --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh}
body{font-family:var(--wm-font-sans); color:var(--wm-ink); background:var(--wm-page-bg);
  -webkit-font-smoothing:antialiased; line-height:1.5; font-size:16px; display:flex; flex-direction:column}
body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:linear-gradient(rgba(31,44,92,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(31,44,92,.035) 1px,transparent 1px);
  background-size:34px 34px}
h1,h2,h3,h4{margin:0; font-family:var(--wm-font-serif); letter-spacing:-.5px; font-weight:600; color:var(--wm-ink)}
button{font-family:inherit; cursor:pointer}
a{color:inherit; text-decoration:none}
:focus-visible{outline:3px solid var(--wm-blue-bright); outline-offset:2px; border-radius:6px}
code{font-family:ui-monospace,monospace; font-size:.92em; background:rgba(20,30,70,.07); padding:1px 5px; border-radius:5px}

/* prototype nav (review chrome, not product) */
.proto{position:sticky; top:0; z-index:60; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:8px 16px; background:#15203f; color:#cdd6f5; font-size:12.5px; border-bottom:1px solid rgba(255,255,255,.08)}
.proto .tag{font-weight:700; letter-spacing:1px; color:#7f8fce; text-transform:uppercase; font-size:11px}
.proto button{background:transparent; color:#cdd6f5; border:1px solid rgba(255,255,255,.16);
  padding:5px 11px; border-radius:var(--r-pill); font-size:12.5px; font-weight:500; transition:background .14s var(--ease)}
.proto button:hover{background:rgba(255,255,255,.10)}
.proto button[aria-current="true"]{background:var(--wm-blue-bright); border-color:transparent; color:#fff}
.proto .spacer{flex:1}
.proto select{background:#1f2c5c; color:#cdd6f5; border:1px solid rgba(255,255,255,.18); border-radius:var(--r-pill); padding:5px 10px; font:inherit; font-size:12.5px}

/* product shell */
#app{display:grid; grid-template-areas:"top top" "side main"; grid-template-columns:240px 1fr; grid-template-rows:auto 1fr; flex:1; position:relative; z-index:1}
.topbar{grid-area:top; position:sticky; top:38px; z-index:40; background:var(--wm-navy-deep); color:#fff; display:flex; align-items:center; gap:14px; padding:12px 24px}
.brand{display:flex; align-items:center; gap:11px; font-family:var(--wm-font-serif); font-weight:600; font-size:20px}
.pie{width:24px; height:24px; border-radius:50%;
  background:conic-gradient(var(--wm-mean-spark) 0deg 90deg,var(--wm-mean-wrong) 90deg 180deg,var(--wm-blue-bright) 180deg 270deg,var(--wm-mean-magnitude) 270deg 360deg);
  box-shadow:inset 0 0 0 3px var(--wm-navy-deep), 0 0 0 1.5px rgba(255,255,255,.25)}
.tpill{font-size:10.5px; font-weight:700; letter-spacing:1.5px; background:rgba(255,255,255,.14); padding:3px 9px; border-radius:var(--r-pill); margin-left:2px}
.topbar .spacer{flex:1}
.user-avatar{width:34px; height:34px; border-radius:50%; background:var(--wm-mean-operation); color:#fff; font-weight:700; font-size:13px; display:grid; place-items:center; border:1.5px solid #fff}

.sidenav{grid-area:side; background:rgba(31,44,92,0.03); border-right:1.5px solid rgba(20,30,70,.06); padding:30px 14px; display:flex; flex-direction:column}
.cls-selector{margin-bottom:24px}
.cls-label{font-size:11px; font-weight:700; letter-spacing:1px; color:#6a7088; text-transform:uppercase; margin-bottom:6px; padding-left:10px}
.cls-btn{width:100%; display:flex; align-items:center; gap:10px; padding:10px; background:#fff; border-radius:var(--r-md); border:1.5px solid rgba(20,30,70,.10); box-shadow:var(--sh-card); text-align:left}
.cls-btn .name{font-family:var(--wm-font-serif); font-weight:600; font-size:15px}
.cls-btn .meta{font-size:12px; color:var(--wm-ink-soft)}
.nav-group{margin-bottom:24px}
.nav-group:last-child{margin-top:auto; margin-bottom:0}
.nav-link{display:flex; align-items:center; gap:11px; padding:10px 14px; color:var(--wm-ink); font-weight:500; font-size:14.5px; border-radius:9px; transition:background .1s; width:100%; border:none; background:none; text-align:left}
.nav-link:hover{background:rgba(20,30,70,0.05)}
.nav-link.active{background:var(--wm-blue-tile); color:var(--wm-navy-deep); font-weight:600}
.nav-link svg{opacity:.7}
.nav-link.active svg{opacity:1; color:var(--wm-navy)}
.nav-link.muted{color:#8389a0; cursor:default}
.nav-link.muted:hover{background:none}

.page{grid-area:main; padding:30px 40px 80px; min-width:0}
.view{display:none} .view.active{display:block}

.page-head h1{font-size:32px; line-height:1.1}
.page-head .sub{color:var(--wm-ink-soft); font-size:15px; margin-top:4px}

.summary{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:22px 0}
.stat{background:#fff; border-radius:var(--r-lg); box-shadow:var(--sh-card); padding:18px 20px; display:flex; align-items:center; gap:16px}
.stat .ico{width:40px; height:40px; border-radius:var(--r-sm); display:grid; place-items:center; flex:none}
.stat .num{font-family:var(--wm-font-serif); font-size:34px; font-weight:600; line-height:1}
.stat .lab{font-size:13px; color:var(--wm-ink-soft); font-weight:500; margin-top:3px}
.stat.s-struggling .ico{background:rgba(217,102,63,.16); color:var(--wm-mean-wrong-ink)}
.stat.s-needs .ico{background:rgba(224,163,58,.18); color:var(--wm-mean-attention-ink)}
.stat.s-ontrack .ico{background:rgba(154,209,124,.22); color:var(--wm-mean-correct-ink)}

.split-content{display:grid; grid-template-columns:1.25fr 1fr; gap:24px; margin-top:4px; align-items:start}
.secondary-info{display:flex; flex-direction:column; gap:18px; position:sticky; top:120px}

.triage{background:linear-gradient(180deg,var(--wm-card-warm),#fff); box-shadow:var(--sh-card), 0 18px 40px -22px rgba(217,102,63,.3)}
.triage .whead{font-family:var(--wm-font-serif); font-size:21px; font-weight:600; line-height:1.2}
.triage .wdetail{font-size:14.5px; color:var(--wm-ink-soft); margin-top:8px; line-height:1.55}
.triage .wbtn{display:flex; width:100%; margin-top:18px}

.search{position:relative; margin-bottom:18px}
.search svg{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#6a7088}
.search input{width:100%; padding:12px 14px 12px 42px; font:inherit; font-size:15px; border-radius:var(--r-md); border:1.5px solid rgba(20,30,70,.12); background:#fff; color:var(--wm-ink)}

.section{margin-bottom:24px}
.sec-head{display:flex; align-items:center; gap:11px; margin-bottom:11px; padding-left:14px; position:relative; flex-wrap:wrap}
.sec-head::before{content:""; position:absolute; left:0; top:3px; bottom:3px; width:4px; background:var(--rule); border-radius:2px}
.sec-head .stitle{font-family:var(--wm-font-serif); font-size:21px; font-weight:600}
.sec-head .scount{font-family:var(--wm-font-serif); font-weight:600; font-size:15px; color:var(--wm-ink-soft); background:rgba(20,30,70,.06); padding:1px 10px; border-radius:var(--r-pill)}
.sec-head .sblurb{font-size:12.5px; color:var(--wm-ink-soft); margin-left:auto}
.sec-struggling{--rule:var(--wm-mean-wrong)} .sec-needs{--rule:var(--wm-mean-attention)} .sec-ontrack{--rule:var(--wm-mean-correct)}

.row{width:100%; text-align:left; background:#fff; border:none; border-radius:var(--r-lg); box-shadow:var(--sh-card);
  padding:15px 18px; margin-bottom:11px; display:grid; gap:13px; grid-template-columns:8px 1fr 20px; align-items:center;
  transition:transform .16s var(--ease), box-shadow .16s var(--ease)}
.row:hover{transform:translateY(-1px); box-shadow:0 6px 0 -2px rgba(20,30,70,.10), inset 0 0 0 1.5px rgba(20,30,70,.10)}
.row .sdot{width:8px; height:8px; border-radius:50%; flex:none}
.sec-struggling .row .sdot{background:var(--wm-mean-wrong)} .sec-needs .row .sdot{background:var(--wm-mean-attention)} .sec-ontrack .row .sdot{background:var(--wm-mean-correct)}
.row .nrow{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.row .name{font-family:var(--wm-font-serif); font-size:19px; font-weight:600; line-height:1.1}
.row .badges{display:flex; gap:6px; flex-wrap:wrap; margin-left:auto}
.row .reason{font-size:13.5px; color:var(--wm-ink-soft); margin-top:3px}
.row .where{font-size:12.5px; color:#6a7088; margin-top:4px; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.row .where .ldot{width:3px;height:3px;border-radius:50%;background:#9aa0b6}
.row .lesson{font-weight:600; color:var(--wm-navy)}
.row .pwrap{margin-top:9px}
.row .chev{color:#9aa0b6; display:grid; place-items:center}

.prog{display:flex; align-items:center; gap:9px}
.prog .track{flex:1; height:7px; border-radius:var(--r-pill); background:rgba(20,30,70,.10); overflow:hidden}
.prog .fill{height:100%; border-radius:var(--r-pill); background:var(--wm-blue-bright)}
.prog .pct{font-family:var(--wm-font-serif); font-size:13px; font-weight:600; color:var(--wm-ink-soft); min-width:34px; text-align:right}
.prog.notstarted .pct{color:#8389a0}

.chip{display:inline-flex; align-items:center; gap:6px; border-radius:var(--r-pill); font-weight:600; line-height:1; white-space:nowrap}
.chip.md{font-size:13px; padding:6px 12px} .chip.sm{font-size:11.5px; padding:4px 9px}
.chip svg{flex:none}
.chip-struggling{background:rgba(217,102,63,.15); color:var(--wm-mean-wrong-ink)}
.chip-needs{background:rgba(224,163,58,.18); color:var(--wm-mean-attention-ink)}
.chip-ontrack{background:rgba(154,209,124,.24); color:var(--wm-mean-correct-ink)}

.badge{display:inline-flex; align-items:center; gap:5px; border-radius:var(--r-pill); font-weight:600; line-height:1.2; white-space:nowrap; font-size:11.5px; padding:4px 9px}
.badge svg{flex:none}
.badge-urgent{background:rgba(217,102,63,.15); color:var(--wm-mean-wrong-ink)}
.badge-warn{background:rgba(224,163,58,.18); color:var(--wm-mean-attention-ink)}
.badge-info{background:rgba(74,108,240,.13); color:var(--wm-info-ink)}

.alert-full{display:flex; gap:11px; padding:13px 15px; border-radius:var(--r-md); align-items:flex-start}
.alert-full .ai{margin-top:1px; flex:none}
.alert-full .al{font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:8px}
.alert-full .am{font-size:14px; margin-top:3px; color:var(--wm-ink-soft)}
.alert-full .sev{font-size:10.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; opacity:.8}
.af-urgent{background:rgba(217,102,63,.12); color:var(--wm-mean-wrong-ink); box-shadow:inset 0 0 0 1.5px rgba(217,102,63,.3)}
.af-warn{background:rgba(224,163,58,.14); color:var(--wm-mean-attention-ink); box-shadow:inset 0 0 0 1.5px rgba(224,163,58,.32)}
.af-info{background:rgba(74,108,240,.10); color:var(--wm-info-ink); box-shadow:inset 0 0 0 1.5px rgba(74,108,240,.25)}

.empty{background:#fff; border-radius:var(--r-lg); box-shadow:var(--sh-card); padding:40px 28px; text-align:center; color:var(--wm-ink-soft)}
.empty h2{font-size:22px; margin-bottom:6px; color:var(--wm-ink)}
.allclear{background:linear-gradient(180deg,var(--wm-card-mint),#fff); border-radius:var(--r-xl); box-shadow:var(--sh-card); padding:42px 26px; text-align:center; margin-bottom:22px}
.allclear .ring{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px; background:rgba(154,209,124,.3); color:var(--wm-mean-correct-ink)}
.allclear h2{font-size:26px; margin-bottom:6px} .allclear p{color:var(--wm-ink-soft); max-width:440px; margin:0 auto; font-size:15px}

.skel{background:#fff; border-radius:var(--r-lg); box-shadow:var(--sh-card); padding:16px 18px; margin-bottom:11px}
.sk{background:linear-gradient(90deg,rgba(20,30,70,.06),rgba(20,30,70,.12),rgba(20,30,70,.06)); background-size:200% 100%; border-radius:6px; animation:shimmer 1.4s var(--ease) infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.loading-note{color:var(--wm-ink-soft); margin:4px 0 16px; font-size:14px}
.errbox{background:rgba(217,102,63,.10); box-shadow:inset 0 0 0 1.5px rgba(217,102,63,.3); border-radius:var(--r-md); padding:16px 18px; color:var(--wm-mean-wrong-ink); display:flex; gap:12px; align-items:flex-start}
.errbox h3{font-size:15px; color:var(--wm-mean-wrong-ink); margin-bottom:3px} .errbox p{font-size:13.5px; margin:0}
.errbox button{margin-top:9px; background:var(--wm-mean-wrong); color:#fff; border:none; padding:7px 14px; border-radius:var(--r-pill); font-size:13px; font-weight:600}

/* drill-in */
.back{background:transparent; border:none; color:var(--wm-navy); font-weight:600; font-size:14px; display:inline-flex; align-items:center; gap:7px; padding:6px 0; margin-bottom:12px}
.d-identity{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:6px}
.d-identity h1{font-size:32px}
.d-reason{color:var(--wm-ink-soft); font-size:15px; margin-bottom:20px}
.drill-grid{display:grid; grid-template-columns:1.55fr 1fr; gap:24px; align-items:start}
.profile-main{min-width:0}
.profile-activity{position:sticky; top:120px}
.card{background:#fff; border-radius:var(--r-lg); box-shadow:var(--sh-card); padding:20px 22px; margin-bottom:16px}
.card > .ctitle{font-size:12px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#6a7088; margin-bottom:14px}
.alerts-banner{display:flex; flex-direction:column; gap:10px; margin-bottom:16px}

.why{background:linear-gradient(180deg,var(--wm-card-sky),#fff); box-shadow:var(--sh-card), 0 18px 40px -22px rgba(20,30,70,.4)}
.why .whead{font-family:var(--wm-font-serif); font-size:22px; font-weight:600; line-height:1.2; letter-spacing:-.5px}
.why .wdetail{font-size:15px; color:var(--wm-ink-soft); margin-top:10px; line-height:1.55}
.why .wtags{display:flex; gap:8px; flex-wrap:wrap; margin-top:16px}
.wtag{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:var(--r-pill); background:#fff; box-shadow:inset 0 0 0 1.5px rgba(20,30,70,.10); color:var(--wm-ink-soft)}
.wtag .k{color:#6a7088} .wtag.misc{box-shadow:inset 0 0 0 1.5px rgba(91,98,214,.4); color:var(--wm-mean-operation)}
.proxy-note{font-size:11.5px; color:#6a7088; margin-top:12px; display:flex; gap:6px; align-items:flex-start}

.working .wo-unit{font-family:var(--wm-font-serif); font-size:19px; font-weight:600}
.working .wo-lesson{font-size:14px; color:var(--wm-ink-soft); margin:4px 0 14px}
.working .prog{width:100%}

.skills-grid{display:grid; grid-template-columns:1fr 1fr; gap:24px}
.skills-col h4{font-size:13px; font-weight:700; letter-spacing:.4px; margin-bottom:12px; display:flex; align-items:center; gap:7px}
.skill{margin-bottom:13px}
.skill .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; gap:10px}
.skill .sn{font-size:14px; font-weight:500}
.skill .status{font-size:11px; color:#8389a0; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-left:7px}
.skill .sp{font-family:var(--wm-font-serif); font-size:14px; font-weight:600}
.skill .strack{height:6px; border-radius:var(--r-pill); background:rgba(20,30,70,.09); overflow:hidden}
.skill .sfill{height:100%; border-radius:var(--r-pill)}
.skill.str .sfill{background:var(--wm-mean-correct)} .skill.str .sp{color:var(--wm-mean-correct-ink)}
.skill.weak .sfill{background:var(--wm-mean-wrong)} .skill.weak .sp{color:var(--wm-mean-wrong-ink)}
.col-empty{font-size:13.5px; color:#8389a0; padding:8px 0}
.mid-note{font-size:12px; color:#8389a0; margin-top:10px}

.tl{display:flex; flex-direction:column; gap:0}
.tl .ev{display:flex; gap:13px; padding:9px 0; position:relative}
.tl .od{width:12px; height:12px; border-radius:50%; flex:none; margin-top:3px; box-shadow:0 0 0 3px #fff}
.tl .ev:not(:last-child) .od::after{content:""; position:absolute; left:5.5px; top:15px; bottom:-3px; width:1.5px; background:rgba(20,30,70,.10)}
.od-correct{background:var(--wm-mean-correct)} .od-incorrect{background:var(--wm-mean-wrong)} .od-neutral{background:#9aa0b6}
.tl .elabel{font-size:13.5px}
.tl .ekind{display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-left:7px}
.ek-correct{color:var(--wm-mean-correct-ink)} .ek-incorrect{color:var(--wm-mean-wrong-ink)} .ek-neutral{color:#6a7088}
.tl .etime{font-size:11.5px; color:#8389a0; margin-top:1px}

.assign-list{display:flex; flex-direction:column; gap:9px}
.unit{display:flex; align-items:center; gap:13px; padding:13px 15px; border-radius:var(--r-md); box-shadow:inset 0 0 0 1.5px rgba(20,30,70,.10); background:#fff}
.unit.assigned{box-shadow:inset 0 0 0 2px var(--wm-mean-correct); background:var(--wm-card-mint)}
.unit .ut{font-weight:600; font-size:15px; flex:1}
.unit .ulocked{font-size:12px; color:var(--wm-mean-attention-ink); font-weight:600; display:flex; align-items:center; gap:5px}
.unit .assigned-tag{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:var(--wm-mean-correct-ink)}
.btn-assign{background:var(--wm-navy); color:#fff; border:none; padding:8px 16px; border-radius:var(--r-pill); font-size:13.5px; font-weight:600; transition:background .14s; white-space:nowrap}
.btn-assign:hover{background:var(--wm-blue)} .btn-assign:active{background:var(--wm-blue-press)} .btn-assign:disabled{opacity:.55; cursor:default}
.btn-assign.confirm{background:var(--wm-mean-wrong)} .btn-assign.confirm:hover{background:var(--wm-mean-wrong-ink)}
.btn-ghost{background:transparent; color:var(--wm-ink-soft); border:1.5px solid rgba(20,30,70,.16); padding:8px 14px; border-radius:var(--r-pill); font-size:13px; font-weight:600}
.confirm-row{display:flex; gap:7px; align-items:center}
.confirm-q{font-size:12.5px; color:var(--wm-mean-wrong-ink); font-weight:600; margin-right:3px}
.assign-hint{font-size:12.5px; color:var(--wm-ink-soft); margin:-6px 0 14px}

.btn-primary{background:var(--wm-navy); color:#fff; border:none; padding:11px 20px; border-radius:var(--r-pill); font-size:14.5px; font-weight:600; transition:background .14s; text-align:center; justify-content:center; display:inline-flex; align-items:center; gap:8px}
.btn-primary:hover{background:var(--wm-blue)}

/* class skills */
.cls-intro{color:var(--wm-ink-soft); font-size:15px; margin:6px 0 22px; max-width:660px}
.skillcard{background:#fff; border-radius:var(--r-lg); box-shadow:var(--sh-card); margin-bottom:11px; overflow:hidden}
.sc-head{display:flex; align-items:center; gap:14px; padding:16px 18px; width:100%; background:none; border:none; text-align:left}
.sc-count{width:46px; height:46px; border-radius:var(--r-md); display:grid; place-items:center; flex:none; font-family:var(--wm-font-serif); font-size:22px; font-weight:600}
.sc-count.hot{background:rgba(217,102,63,.16); color:var(--wm-mean-wrong-ink)} .sc-count.med{background:rgba(224,163,58,.18); color:var(--wm-mean-attention-ink)}
.sc-name{font-family:var(--wm-font-serif); font-size:18px; font-weight:600} .sc-sub{font-size:13px; color:var(--wm-ink-soft); margin-top:2px}
.sc-chev{margin-left:auto; color:#9aa0b6; transition:transform .2s var(--ease)} .skillcard.open .sc-chev{transform:rotate(90deg)}
.sc-body{padding:0 18px 16px 78px; display:none} .skillcard.open .sc-body{display:block}
.stuckrow{display:flex; align-items:center; gap:11px; padding:9px 0; border-top:1px solid rgba(20,30,70,.07); width:100%; background:none; border-left:none; border-right:none; border-bottom:none; text-align:left}
.stuckrow .sname{font-weight:600; font-size:14.5px; flex:1} .stuckrow .spct{font-family:var(--wm-font-serif); font-weight:600; font-size:13.5px; color:var(--wm-mean-wrong-ink)}

/* gallery */
.gallery h2{font-size:24px; margin:28px 0 4px} .gallery .gnote{font-size:13.5px; color:var(--wm-ink-soft); margin-bottom:16px}
.specrow{background:#fff; border-radius:var(--r-lg); box-shadow:var(--sh-card); padding:18px 20px; margin-bottom:14px}
.specrow .label{font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#6a7088; margin-bottom:12px}
.specset{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
.dormant-note{font-size:11.5px; color:var(--wm-mean-attention-ink); margin-top:9px; display:flex; gap:6px; align-items:flex-start; font-weight:500}

/* toast */
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(140%); background:var(--wm-navy-deep); color:#fff; padding:13px 20px; border-radius:var(--r-pill); font-size:14px; font-weight:500; box-shadow:var(--sh-soft); z-index:90; display:flex; gap:10px; align-items:center; transition:transform .3s var(--ease)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* sign-in overlay */
.signin-wrap{position:fixed; inset:0; z-index:100; background:var(--wm-page-bg); display:none}
.signin-wrap.active{display:block}
.signin{display:grid; grid-template-columns:1.05fr 1fr; height:100%}
.si-left{background:var(--wm-navy-deep); position:relative; overflow:hidden; display:grid; place-items:center; padding:40px}
.si-left .c{position:absolute; border-radius:50%; mix-blend-mode:screen}
.si-grid{position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px); background-size:40px 40px}
.preview-card{position:relative; background:#fff; border-radius:var(--r-xl); box-shadow:0 30px 60px -20px rgba(0,0,0,.5); padding:18px; width:min(330px,80%); transform:rotate(-2deg)}
.preview-card .pc-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(20,30,70,.07)}
.preview-card .pc-row:last-child{border:none}
.pc-dot{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center}
.pc-name{font-family:var(--wm-font-serif); font-weight:600; font-size:14px} .pc-meta{font-size:11px; color:#8389a0}
.si-right{background:#fff; display:grid; place-items:center; padding:40px}
.si-inner{width:min(380px,100%)}
.si-mark{display:flex; align-items:center; gap:10px; margin-bottom:30px}
.si-mark .pie{width:30px;height:30px;box-shadow:inset 0 0 0 4px #fff,0 0 0 1.5px rgba(20,30,70,.12)}
.si-tpill{font-size:10px; font-weight:700; letter-spacing:1.5px; background:rgba(47,67,166,.1); color:var(--wm-navy); padding:3px 9px; border-radius:var(--r-pill)}
.si-inner h1{font-size:38px; line-height:1.08; margin-bottom:12px}
.si-inner .lead{font-size:16px; color:var(--wm-ink-soft); margin-bottom:30px}
.btn-google{width:100%; background:#fff; color:var(--wm-ink); border:1.5px solid var(--wm-navy-deep); padding:13px; border-radius:var(--r-md); font-size:15px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:11px; box-shadow:var(--sh-card); transition:transform .14s}
.btn-google:hover{transform:translateY(-1px)}
.demo-link{display:block; width:100%; text-align:center; background:none; border:none; color:var(--wm-navy); font-weight:600; font-size:14.5px; margin-top:16px; padding:8px}
.si-foot{font-size:12px; color:#8389a0; margin-top:26px; line-height:1.5}

@media (max-width:1100px){ #app{grid-template-columns:1fr} .sidenav{display:none} .secondary-info{position:static} }
@media (max-width:900px){ .split-content{grid-template-columns:1fr} .drill-grid{grid-template-columns:1fr} .profile-activity{position:static} }
@media (max-width:880px){ .signin{grid-template-columns:1fr} .si-left{display:none} }
@media (max-width:560px){ .summary{grid-template-columns:1fr} .skills-grid{grid-template-columns:1fr} .page{padding:24px 18px 60px} .sec-head .sblurb{display:none} }
@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important} }

const CLASS_NAME='Period 3 · Grade 6 Math', TEACHER_NAME='Ms. Alvarez';

/* ============================ STATE ============================ */
let state = { view:'roster', studentId:'s1', search:'', rosterState:'normal', confirmingUnit:null, busyUnit:null, _focusSearch:false };

/* ============================ HELPERS ============================ */
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = f => Math.round(f*100);
const byId = id => STUDENTS.find(s=>s.student_id===id);
const SEVRANK = {urgent:0, warn:1, info:2};
const sortedAlerts = s => [...s.alerts].sort((x,y)=>SEVRANK[x.severity]-SEVRANK[y.severity]);
const topPriority = () => STUDENTS.find(s=>s.category==='struggling') || STUDENTS.find(s=>s.category==='needs_attention') || STUDENTS[0];

function catChip(category,size='md'){
  const c=CATEGORY[category];
  return `<span class="chip ${size} ${c.chip}">${I[c.icon]()}<span>${c.label}</span></span>`;
}
function alertBadge(al){
  const s=SEV[al.severity];
  return `<span class="badge ${s.badge}" title="${esc(s.word)}: ${esc(al.message)}">${I[s.icon]()}<span>${ALERT_LABEL[al.kind]}</span></span>`;
}
function progress(frac){
  const p=pct(frac), ns=(frac===0);
  return `<div class="prog ${ns?'notstarted':''}" role="progressbar" aria-valuenow="${p}" aria-valuemin="0" aria-valuemax="100" aria-label="Unit progress ${p}%">
    <div class="track"><div class="fill" style="width:${p}%"></div></div><span class="pct">${ns?'—':p+'%'}</span></div>`;
}
function trendTag(t){
  if(!t) return '';
  const ic = t==='rising'?I.up():t==='falling'?I.down():I.steady();
  return `<span class="wtag"><span class="k">Help-need</span>${ic}<span>${t}</span></span>`;
}

/* ============================ SIDENAV ============================ */
function renderSidenav(){
  const A=(view,icon,label)=>`<button class="nav-link ${state.view===view?'active':''}" data-view="${view}">${I[icon]()} ${label}</button>`;
  document.getElementById('sidenav').innerHTML = `
    <div class="cls-selector"><div class="cls-label">Active class</div>
      <button class="cls-btn"><span class="user-avatar" style="width:30px;height:30px;border:none;font-size:12px">A</span>
        <div><div class="name">Period 3</div><div class="meta">Grade 6 Math</div></div>
        <span style="margin-left:auto;opacity:.6">${I.updown()}</span></button></div>
    <nav class="nav-group">
      ${A('roster','home','Home')}
      ${A('student','shield','Triage central')}
      ${A('class','grid','Skill maps')}
    </nav>
    <div class="nav-group">
      <span class="nav-link muted">${I.settings()} Settings</span>
      <button class="nav-link" data-view="signin">${I.signout()} Sign out</button>
    </div>`;
}

/* ============================ ROSTER ============================ */
function renderRoster(){
  if(state.rosterState==='loading') return rosterLoading();
  if(state.rosterState==='error') return rosterError();

  const ds = state.rosterState==='allclear' ? STUDENTS.filter(s=>s.category==='on_track') : STUDENTS;
  if(state.rosterState==='emptyroster'){
    return `<div class="page-head"><h1>${esc(CLASS_NAME)}</h1><p class="sub">${esc(TEACHER_NAME)}</p></div>
      <div class="empty" style="margin-top:24px"><h2>No students on your roster yet.</h2>
      <p>Once students join ${esc(CLASS_NAME)}, they'll appear here ranked by who needs help first.</p></div>`;
  }

  const q=state.search.trim().toLowerCase();
  const filtered = ds.filter(s=>s.name.toLowerCase().includes(q));
  const counts={struggling:0,needs_attention:0,on_track:0}; ds.forEach(s=>counts[s.category]++);
  const groups={struggling:[],needs_attention:[],on_track:[]}; filtered.forEach(s=>groups[s.category].push(s));
  const noActive = groups.struggling.length===0 && groups.needs_attention.length===0;

  let list='';
  if(q && filtered.length===0){
    list = `<div class="empty"><h2>No students match “${esc(state.search)}”.</h2><p>Try a different name, or clear the search to see the full class.</p></div>`;
  } else {
    list = section('struggling',groups.struggling)+section('needs_attention',groups.needs_attention)+section('on_track',groups.on_track);
  }

  const allClear = !q && noActive && groups.on_track.length>0;
  const heroPanel = allClear
    ? `<div class="card allclear"><div class="ring">${I.check('#3f7a3a')}</div><h2>Whole class on track</h2>
        <p>No urgent or warning signals anywhere in ${esc(CLASS_NAME)} right now. Nothing needs triage.</p></div>`
    : triageHero();

  return `<div class="page-head"><h1>${esc(CLASS_NAME)}</h1><p class="sub">${esc(TEACHER_NAME)} · ${ds.length} students</p></div>
    <div class="summary">${stat('struggling',counts.struggling)}${stat('needs_attention',counts.needs_attention)}${stat('on_track',counts.on_track)}</div>
    <div class="split-content">
      <div class="primary-list">
        <div class="search">${I.search('#6a7088')}
          <input id="searchInput" type="search" placeholder="Filter by student name…" value="${esc(state.search)}" aria-label="Filter students by name" autocomplete="off"></div>
        ${list}
      </div>
      <aside class="secondary-info">${heroPanel}</aside>
    </div>`;
}
function triageHero(){
  const s=topPriority(); if(!s) return '';
  const al=sortedAlerts(s)[0];
  return `<div class="card triage">
    <div class="ctitle">Highest priority</div>
    <div class="whead">Check in with ${esc(s.name)}</div>
    <div class="wdetail">${esc(al?al.message:s.category_reason)} ${s.current_unit_title?`In <strong>${esc(s.current_unit_title)}</strong>.`:''}</div>
    <button class="btn-primary wbtn" data-student="${s.student_id}">${I.eye('#fff')} Open ${esc(s.name.split(' ')[0])}'s profile</button>
  </div>`;
}
function stat(cat,n){
  const c=CATEGORY[cat];
  return `<div class="stat ${c.stat}"><span class="ico">${I[c.icon]()}</span><span><span class="num">${n}</span><div class="lab">${c.label}</div></span></div>`;
}
function section(cat,list){
  if(list.length===0) return '';
  const c=CATEGORY[cat];
  return `<section class="section ${c.sec}"><div class="sec-head"><span class="stitle">${c.label}</span>
    <span class="scount">${list.length}</span><span class="sblurb">${c.blurb}</span></div>${list.map(rowHTML).join('')}</section>`;
}
function rowHTML(s){
  const where = (s.current_lesson_title||s.current_unit_title)
    ? `<span class="lesson">${esc(s.current_lesson_title||'—')}</span><span class="ldot"></span><span>${esc(s.current_unit_title||'—')}</span>`
    : `<span style="color:#8389a0">Not started</span>`;
  const badges = s.alerts.length
    ? `<div class="badges">${sortedAlerts(s).map(alertBadge).join('')}</div>`
    : `<div class="badges"><span class="badge badge-info" style="background:rgba(154,209,124,.2);color:#3f7a3a">${I.check()}<span>No alerts</span></span></div>`;
  return `<button class="row" data-student="${s.student_id}">
    <span class="sdot"></span>
    <div>
      <div class="nrow"><span class="name">${esc(s.name)}</span>${badges}</div>
      <div class="reason">${esc(s.category_reason)}</div>
      <div class="where">${where}</div>
      <div class="pwrap">${progress(s.percent_complete)}</div>
    </div>
    <span class="chev">${I.chev()}</span>
  </button>`;
}
function rosterLoading(){
  const sk=`<div class="skel"><div class="sk" style="height:20px;width:40%;margin-bottom:9px"></div><div class="sk" style="height:13px;width:65%;margin-bottom:14px"></div><div class="sk" style="height:7px;width:100%"></div></div>`;
  return `<div class="page-head"><div class="sk" style="height:32px;width:300px;border-radius:8px"></div></div>
    <p class="loading-note">Loading your class…</p>${sk+sk+sk}`;
}
function rosterError(){
  return `<div class="page-head"><h1>${esc(CLASS_NAME)}</h1></div>
    <div class="errbox" role="alert" style="margin-top:20px"><span class="ai">${I.triangle('var(--wm-mean-wrong)')}</span>
      <div><h3>Couldn't load your class</h3><p>Something went wrong fetching the roster. Your connection may have dropped.</p>
      <button onclick="setRosterState('normal')">Try again</button></div></div>`;
}

/* ============================ DRILL-IN ============================ */
function renderStudent(){
  const s=byId(state.studentId);
  if(!s) return `<button class="back" data-view="roster">${I.back()} Back to class</button>
    <div class="errbox" role="alert"><span class="ai">${I.triangle('var(--wm-mean-wrong)')}</span><div><h3>Couldn't load this student</h3><p>They may not be on your roster.</p></div></div>`;

  const banner = s.alerts.length
    ? sortedAlerts(s).map(al=>{const sv=SEV[al.severity];
        return `<div class="alert-full ${sv.full}"><span class="ai">${I[sv.icon]()}</span>
          <div><div class="al"><span class="sev">${sv.word}</span>${ALERT_LABEL[al.kind]}</div><div class="am">${esc(al.message)}</div></div></div>`;}).join('')
    : `<div class="alert-full af-info" style="background:rgba(154,209,124,.14);color:#3f7a3a;box-shadow:inset 0 0 0 1.5px rgba(154,209,124,.4)">
        <span class="ai">${I.check('#3f7a3a')}</span><div><div class="al">No alerts</div><div class="am">This student is moving along — nothing flagged right now.</div></div></div>`;

  const w=s.why; const tags=[];
  if(w.matched_misconception) tags.push(`<span class="wtag misc">${I.eye('var(--wm-mean-operation)')}<span class="k">Misconception</span><span>${esc(w.matched_misconception)}</span></span>`);
  if(w.helpneed_trend) tags.push(trendTag(w.helpneed_trend));
  if(w.recent_error_rate!=null) tags.push(`<span class="wtag"><span class="k">Recent errors</span><span>${pct(w.recent_error_rate)}%</span></span>`);

  const strengths = s.skills.filter(k=> (k.status==='mastered'||k.status==='due_review') || (k.status==='in_progress'&&k.probability>=0.70)).sort((a,b)=>b.probability-a.probability);
  const weak = s.skills.filter(k=> k.status==='in_progress'&&k.probability<0.50).sort((a,b)=>a.probability-b.probability);
  const shownIds = new Set([...strengths,...weak].map(k=>k.skill_name));
  const midCount = s.skills.filter(k=>!shownIds.has(k.skill_name)).length;

  const working = s.current_unit_title
    ? `<div class="wo-unit">${esc(s.current_unit_title)}</div><div class="wo-lesson">Current lesson: ${esc(s.current_lesson_title||'—')}</div>${progress(s.percent_complete)}`
    : `<div class="wo-unit" style="color:#8389a0">Not started</div><div class="wo-lesson">No unit in progress yet. Assign one below to begin.</div>${progress(0)}`;

  return `<button class="back" data-view="roster">${I.back()} Back to class</button>
    <div class="d-identity"><h1>${esc(s.name)}</h1>${catChip(s.category,'md')}</div>
    <p class="d-reason">${esc(s.category_reason)}</p>
    <div class="drill-grid">
      <div class="profile-main">
        <div class="alerts-banner" aria-live="polite" aria-label="Alerts for ${esc(s.name)}">${banner}</div>

        <div class="card why"><div class="ctitle">What's going on</div>
          <div class="whead">${esc(w.headline)}</div>
          <div class="wdetail">${esc(w.detail)}</div>
          ${tags.length?`<div class="wtags">${tags.join('')}</div>`:''}
          ${w.helpneed_trend?`<div class="proxy-note">${I.info('#6a7088')}<span>Help-need trend is a behavioral proxy from the answer stream (wrong or hinted = needed help), comparing the earlier and later half of recent work — not a precise ML confidence readout.</span></div>`:''}
        </div>

        <div class="card working"><div class="ctitle">Working on</div>${working}</div>

        <div class="card"><div class="ctitle">Skills</div>
          <div class="skills-grid">
            <div class="skills-col"><h4>${I.check('var(--wm-mean-correct-ink)')}<span style="color:var(--wm-mean-correct-ink)">Strengths</span></h4>
              ${strengths.length?strengths.map(skillRow).join(''):`<div class="col-empty">No strengths recorded yet.</div>`}</div>
            <div class="skills-col"><h4>${I.triangle('var(--wm-mean-wrong-ink)')}<span style="color:var(--wm-mean-wrong-ink)">Needs work</span></h4>
              ${weak.length?weak.map(skillRow).join(''):`<div class="col-empty">Nothing flagged below target.</div>`}</div>
          </div>
          ${s.skills.length===0?`<div class="mid-note">No skills touched yet — untouched skills aren't shown as failing.</div>`
            : midCount?`<div class="mid-note">${midCount} more skill${midCount>1?'s':''} in progress and on target (between 50% and 70%).</div>`:''}
        </div>

        <div class="card"><div class="ctitle">Assign next unit</div>
          <p class="assign-hint">The student sees this as their starred “Keep going” target.</p>
          <div class="assign-list">${s.assignable.map(u=>unitRow(s,u)).join('')}</div></div>
      </div>

      <aside class="profile-activity card"><div class="ctitle">${esc(s.name.split(' ')[0])}'s recent activity</div>
        ${s.timeline.length?`<div class="tl">${s.timeline.map(timelineRow).join('')}</div>`:`<div class="col-empty">No recent activity.</div>`}
      </aside>
    </div>`;
}
function skillRow(k){
  const weak = k.status==='in_progress'&&k.probability<0.50;
  const cls = weak?'weak':'str';
  const statusTxt = k.status==='in_progress'?'In progress':k.status.charAt(0).toUpperCase()+k.status.slice(1).replace('_',' ');
  return `<div class="skill ${cls}"><div class="top"><span class="sn">${esc(k.skill_name)}<span class="status">${statusTxt}</span></span><span class="sp">${pct(k.probability)}%</span></div>
    <div class="strack"><div class="sfill" style="width:${pct(k.probability)}%"></div></div></div>`;
}
function timelineRow(e){
  const word = e.outcome==='correct'?'Correct':e.outcome==='incorrect'?'Incorrect':'Note';
  const ic = e.outcome==='correct'?I.check():e.outcome==='incorrect'?I.triangle():I.info();
  return `<div class="ev"><span class="od od-${e.outcome}"></span>
    <div><div class="elabel">${esc(e.label)}<span class="ekind ek-${e.outcome}">${ic}${word}</span></div><div class="etime">${esc(e.at)}</div></div></div>`;
}
function unitRow(s,u){
  const isAssigned = s.assigned_unit_id===u.unit_id;
  const busy = state.busyUnit===u.unit_id;
  const confirming = state.confirmingUnit===u.unit_id;
  let right;
  if(isAssigned) right = `<span class="assigned-tag">${I.star('var(--wm-mean-correct-ink)','var(--wm-mean-spark)')} Assigned</span>`;
  else if(busy) right = `<button class="btn-assign" disabled>Assigning…</button>`;
  else if(confirming) right = `<span class="confirm-row"><span class="confirm-q">Assign anyway?</span>
      <button class="btn-assign confirm" data-assign="${u.unit_id}" data-force="1">Yes, assign</button>
      <button class="btn-ghost" data-cancel="1">Cancel</button></span>`;
  else if(!u.available) right = `<button class="btn-assign" data-assign="${u.unit_id}" data-locked="1">Assign</button>`;
  else right = `<button class="btn-assign" data-assign="${u.unit_id}">Assign</button>`;
  return `<div class="unit ${isAssigned?'assigned':''}"><span class="ut">${esc(u.title)}</span>
    ${!u.available && !isAssigned ? `<span class="ulocked">${I.triangle()}Prerequisites not met</span>`:''}${right}</div>`;
}

/* ============================ CLASS SKILLS ============================ */
function renderClass(){
  const map={};
  STUDENTS.forEach(s=>s.skills.forEach(k=>{ if(k.status==='in_progress'&&k.probability<0.50){ (map[k.skill_name]=map[k.skill_name]||[]).push({name:s.name,id:s.student_id,p:k.probability}); } }));
  const ranked=Object.entries(map).map(([skill,list])=>({skill,list:list.sort((a,b)=>a.p-b.p)})).sort((a,b)=>b.list.length-a.list.length);
  const cards = ranked.map((r,i)=>{
    const hot=r.list.length>=2;
    return `<div class="skillcard ${i===0?'open':''}"><button class="sc-head" data-toggle="1">
      <span class="sc-count ${hot?'hot':'med'}">${r.list.length}</span>
      <span><span class="sc-name">${esc(r.skill)}</span><div class="sc-sub">${r.list.length} ${r.list.length===1?'student':'students'} below target (p(known) &lt; 50%)</div></span>
      <span class="sc-chev">${I.chev()}</span></button>
      <div class="sc-body">${r.list.map(st=>`<button class="stuckrow" data-student="${st.id}"><span class="sname">${esc(st.name)}</span><span class="spct">${pct(st.p)}% known</span>${I.chev('#9aa0b6')}</button>`).join('')}</div></div>`;
  }).join('');
  return `<button class="back" data-view="roster">${I.back()} Back to class</button>
    <div class="page-head"><h1>Class skills</h1></div>
    <p class="cls-intro">Skills where students are currently stuck, ranked by how many. Built from the same per-skill mastery probabilities (p(known)) as the drill-in — a student counts as stuck on a skill that's <em>in progress</em> and below 50%. Tap a skill to see exactly who, then jump into any student.</p>
    ${ranked.length?cards:`<div class="empty"><h2>No common sticking points</h2><p>No skill currently has students below target — nothing to group.</p></div>`}`;
}

/* ============================ GALLERY ============================ */
function renderGallery(){
  const spec=(label,html)=>`<div class="specrow"><div class="label">${label}</div><div class="specset">${html}</div></div>`;
  const allAlerts = Object.keys(ALERT_LABEL).map(k=>alertBadge(a(k,''))).join('');
  const full=(cls,icon,word,label,msg)=>`<div class="alert-full ${cls}" style="max-width:420px"><span class="ai">${I[icon]()}</span><div><div class="al"><span class="sev">${word}</span>${label}</div><div class="am">${msg}</div></div></div>`;
  return `<button class="back" data-view="roster">${I.back()} Back to class</button>
    <div class="page-head"><h1>Components &amp; states</h1></div>
    <p class="gnote" style="margin:8px 0 4px;color:var(--wm-ink-soft);font-size:14px">Reusable primitives on the shared token system. Every state pairs colour with an icon and a word — colour is never the sole signal.</p>
    <div class="gallery">
      <h2>Category chips</h2><p class="gnote">Drives roster grouping + identity. Two sizes.</p>
      ${spec('Medium', catChip('struggling')+catChip('needs_attention')+catChip('on_track'))}
      ${spec('Small', catChip('struggling','sm')+catChip('needs_attention','sm')+catChip('on_track','sm'))}
      <h2>Alert badges — compact</h2><p class="gnote">Roster rows, most-severe-first. Urgent uses a solid triangle, warning an outline triangle, note a circle — so the tier survives greyscale, not just colour. All 7 named rules:</p>
      ${spec('All rules', allAlerts)}
      <div class="dormant-note">${I.info('var(--wm-mean-attention-ink)')}<span>“Stuck in remediation” is wired but dormant — remediation routing isn't built yet, so it never fires in production today. Styled as urgent for when it goes live.</span></div>
      <h2>Alert banners — full</h2><p class="gnote">Drill-in. Severity word + icon + plain-language message. Banner is <code>aria-live="polite"</code>.</p>
      ${spec('Three severities', full('af-urgent','triangleSolid','Urgent','Stuck','Missed the last 3 problems in a row.')+full('af-warn','triangle','Warning','Low engagement','Only 2 problems attempted so far.')+full('af-info','info','Note','Idle','No activity for 5 days.'))}
      <h2>Progress bar</h2><p class="gnote">Structural blue fill (not a meaning colour). Always carries a numeric % — never width/colour alone.</p>
      ${spec('States', `<div style="width:220px">${progress(0.65)}</div><div style="width:220px">${progress(0)}</div>`)}
      <h2>Skill rows</h2><p class="gnote">Strength = mastered/due-review or in-progress ≥70%; weakness = in-progress &lt;50%. Mastered green appears only when earned.</p>
      ${spec('Strength / weakness', `<div style="width:300px">${skillRow(sk('Identify equivalent fractions',0.92,'mastered'))}${skillRow(sk('Add fractions with unlike denominators',0.35,'in_progress'))}</div>`)}
      <h2>Timeline items</h2>
      ${spec('Outcomes', `<div class="tl" style="width:340px">${timelineRow({at:'8m ago',label:'Answered 2/5 + 1/5',outcome:'correct'})}${timelineRow({at:'21m ago',label:'Answered 1/2 + 1/3 (added across)',outcome:'incorrect'})}${timelineRow({at:'1h ago',label:'Reviewed common denominators',outcome:'neutral'})}</div>`)}
      <h2>Stat summary</h2>
      ${spec('Class header', `<div class="summary" style="width:100%;margin:0">${stat('struggling',3)}${stat('needs_attention',4)}${stat('on_track',3)}</div>`)}
    </div>`;
}

/* ============================ SIGN-IN ============================ */

      <div class="si-grid"></div>
      <div class="c" style="width:280px;height:280px;background:var(--wm-blue-bright);opacity:.5;top:-60px;left:-40px"></div>
      <div class="c" style="width:220px;height:220px;background:var(--wm-mean-magnitude);opacity:.45;bottom:-40px;right:30px"></div>
      <div class="c" style="width:160px;height:160px;background:var(--wm-mean-spark);opacity:.35;top:40%;left:30%"></div>
      <div class="preview-card" aria-hidden="true">
        <div class="pc-row"><span class="pc-dot" style="background:rgba(217,102,63,.16)">${I.triangleSolid('var(--wm-mean-wrong-ink)')}</span><div><div class="pc-name">Maya Chen</div><div class="pc-meta">Missed the last 3 in a row</div></div></div>
        <div class="pc-row"><span class="pc-dot" style="background:rgba(224,163,58,.18)">${I.eye('var(--wm-mean-attention-ink)')}</span><div><div class="pc-name">Sofia Ramirez</div><div class="pc-meta">Falling accuracy</div></div></div>
        <div class="pc-row"><span class="pc-dot" style="background:rgba(154,209,124,.24)">${I.check('var(--wm-mean-correct-ink)')}</span><div><div class="pc-name">Grace Nguyen</div><div class="pc-meta">Keeping pace</div></div></div>
      </div>
    </div>
    <div class="si-right"><div class="si-inner">
      <div class="si-mark"><span class="pie"></span><span style="font-family:var(--wm-font-serif);font-weight:600;font-size:20px">WhollyMath</span><span class="si-tpill">TEACHER</span></div>

      <button class="btn-google" data-view="roster">${I.google()} Sign in with Google</button>

/* ============================ ROUTER ============================ */
function render(){
  const signin=document.getElementById('signinView');
  const main=document.getElementById('main');
  document.getElementById('app').style.display = state.view==='signin' ? 'none' : 'grid';
  if(state.view==='signin'){ signin.classList.add('active'); signin.innerHTML=renderSignin(); return; }
  signin.classList.remove('active'); signin.innerHTML='';
  if(state.view==='roster') main.innerHTML=renderRoster();
  else if(state.view==='student') main.innerHTML=renderStudent();
  else if(state.view==='class') main.innerHTML=renderClass();
  else if(state.view==='gallery') main.innerHTML=renderGallery();
  renderSidenav();
  document.querySelectorAll('.proto button[data-view]').forEach(b=>b.setAttribute('aria-current', b.dataset.view===state.view?'true':'false'));
  const si=document.getElementById('searchInput');
  if(si && state._focusSearch){ si.focus(); si.setSelectionRange(si.value.length,si.value.length); state._focusSearch=false; }
}

/* ============================ EVENTS ============================ */
function setRosterState(s){ state.rosterState=s; state.search=''; state.view='roster'; render(); }
function go(view){ state.view=view; state.confirmingUnit=null; render(); window.scrollTo({top:0}); }

document.addEventListener('click', e=>{
  const v=e.target.closest('[data-view]'); if(v){ if(v.dataset.view!=='roster') state.rosterState='normal'; go(v.dataset.view); return; }
  const row=e.target.closest('[data-student]');
  if(row && !e.target.closest('[data-assign],[data-cancel]')){ state.studentId=row.dataset.student; go('student'); return; }
  const tog=e.target.closest('[data-toggle]'); if(tog){ tog.closest('.skillcard').classList.toggle('open'); return; }
  const cancel=e.target.closest('[data-cancel]'); if(cancel){ state.confirmingUnit=null; render(); return; }
  const as=e.target.closest('[data-assign]'); if(as){ handleAssign(as.dataset.assign, as.dataset.locked==='1', as.dataset.force==='1'); return; }
});
document.addEventListener('input', e=>{ if(e.target.id==='searchInput'){ state.search=e.target.value; state._focusSearch=true; render(); } });
document.getElementById('stateSel').addEventListener('change', e=>setRosterState(e.target.value));

function handleAssign(unitId, locked, forced){
  const s=byId(state.studentId);
  if(locked && !forced){ state.confirmingUnit=unitId; render(); return; }
  state.confirmingUnit=null; state.busyUnit=unitId; render();
  setTimeout(()=>{ s.assigned_unit_id=unitId; state.busyUnit=null; render();
    const u=s.assignable.find(x=>x.unit_id===unitId); showToast(`Assigned “${u.title}” to ${s.name}.`); }, 650);
}
let toastT;
function showToast(msg){ const t=document.getElementById('toast'); t.innerHTML=I.check('#fff')+`<span>${esc(msg)}</span>`; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

render();
</script>
