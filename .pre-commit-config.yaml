# Pre-commit hooks: ruff for Python, eslint + prettier for TypeScript (TECH_STACK §8, CLAUDE.md §4).
# Install with: pre-commit install
repos:
  # ─── Python (backend): ruff lint + format ───
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        name: ruff (format)
        files: ^backend/

  # ─── TypeScript (frontend, shared-types, infrastructure): eslint + prettier ───
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: pnpm --filter @whollymath/frontend lint
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
      - id: prettier
        name: prettier (check)
        entry: pnpm exec prettier --check
        language: system
        files: \.(ts|tsx|js|jsx|json|md|ya?ml)$
        exclude: ^backend/
