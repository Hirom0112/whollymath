[project]
name = "whollymath-backend"
version = "0.1.0"
description = "WhollyMath backend: adaptive fraction tutor (FastAPI + SymPy + ML). See ARCHITECTURE.md."
requires-python = ">=3.11"

# Runtime dependencies. Versions are pinned (CLAUDE.md §8.7); each carries a one-line justification.
dependencies = [
    "fastapi==0.136.3",        # API framework for the turn loop; async + Pydantic + OpenAPI (TECH_STACK §3).
    "uvicorn[standard]==0.48.0", # ASGI server running FastAPI in local dev and Fargate (CLAUDE.md §10).
    "sympy==1.14.0",           # The ONLY thing that decides math correctness; lives in domain/ (TECH_STACK §3, ARCHITECTURE §9).
    "sqlalchemy==2.0.50",      # ORM for Postgres (sessions, mastery, persona runs) (TECH_STACK §4).
    "pydantic==2.13.4",        # Typed request/response models; source of truth for generated TS types (TECH_STACK §2).
    "python-dotenv==1.2.2",    # Loads local .env (DATABASE_URL, API keys) in dev; Secrets Manager in prod (CLAUDE.md §10).
]

[dependency-groups]
# Dev-only tooling. Pinned with justification per CLAUDE.md §8.7.
dev = [
    "pytest==9.0.3",  # Test runner; TDD is mandatory for domain/mastery/persona/helpneed (CLAUDE.md §2).
    "ruff==0.15.14",  # Linter + formatter (replaces black) (CLAUDE.md §6).
    "mypy==2.1.0",    # Static type checker run with --strict (CLAUDE.md §6).
    "pydantic-to-typescript==2.0.0",  # Generates shared-types/ TS from the Pydantic schemas — one source of truth for the API contract (TECH_STACK §2). MIT.
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

# ─── Ruff: lint + format (CLAUDE.md §6) ───
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["app", "tests"]

[tool.ruff.lint]
# A reasonable strict-by-default set: pyflakes, pycodestyle, isort (sorted imports), bugbear,
# pyupgrade, naming. snake_case / PascalCase enforced via pep8-naming (CLAUDE.md §6).
select = ["E", "F", "I", "B", "UP", "N", "W"]

[tool.ruff.format]
# ruff format replaces black (CLAUDE.md §6).
quote-style = "double"

# ─── Mypy: strict (CLAUDE.md §6) ───
[tool.mypy]
python_version = "3.11"
strict = true
files = ["app", "tests"]
# SymPy ships no type stubs; ignore missing imports for it specifically rather than globally.
[[tool.mypy.overrides]]
module = ["sympy.*"]
ignore_missing_imports = true

# ─── Pytest: tests/ mirrors app/ (CLAUDE.md §6) ───
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-q"
