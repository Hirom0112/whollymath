# CI: lint, type-check, and test both projects on every push and PR (TECH_STACK §8, CLAUDE.md §4).
# Backend (uv) and frontend (pnpm) run as independent jobs.
name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.7'

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (eslint, prettier, tsc, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.33.1'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm --filter @whollymath/frontend lint

      - name: Type-check (all TS packages)
        run: pnpm -r --if-present typecheck

      - name: Vitest
        run: pnpm --filter @whollymath/frontend test
